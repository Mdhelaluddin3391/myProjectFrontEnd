<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - QuickDash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/support.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="container">
        <div class="support-hero">
            <h1>How can we help you?</h1>
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search issues e.g. 'refund', 'delivery'...">
            </div>
        </div>

        <div class="faq-grid mt-4">
            <div class="card faq-item">
                <i class="fas fa-box text-primary fa-2x mb-3"></i>
                <h4>Orders</h4>
                <p>Track, return or cancel orders</p>
            </div>
            <div class="card faq-item">
                <i class="fas fa-money-bill text-primary fa-2x mb-3"></i>
                <h4>Payments</h4>
                <p>Refunds and payment modes</p>
            </div>
            <div class="card faq-item">
                <i class="fas fa-map-marker-alt text-primary fa-2x mb-3"></i>
                <h4>Delivery</h4>
                <p>Change address, delivery time</p>
            </div>
        </div>

        <div class="contact-section mt-5">
            <h3>Still need help?</h3>
            <div class="d-flex gap-3 mt-3">
                <a href="/support_chat.html" class="card contact-card">
                    <div class="icon-circle bg-green"><i class="fas fa-comments"></i></div>
                    <div>
                        <h5>Live Chat</h5>
                        <p class="small text-muted">Chat with our support team</p>
                    </div>
                </a>
                <div class="card contact-card">
                    <div class="icon-circle bg-blue"><i class="fas fa-envelope"></i></div>
                    <div>
                        <h5>Email Us</h5>
                        <p class="small text-muted">support@quickdash.com</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/assets/js/layout/main-layout.js"></script>
</body>
</html>
