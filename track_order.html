<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - QuickDash</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/track_order_style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main style="display: flex; flex-direction: column; height: calc(100vh - 70px);">
        <div class="track-layout">
            <div class="track-sidebar">
                <div class="d-flex align-center gap-2 mb-4">
                    <a href="/orders.html" class="text-muted"><i class="fas fa-arrow-left"></i></a>
                    <h2 class="m-0" id="t-id">Tracking...</h2>
                </div>

                <div class="timeline-wrapper">
                    <div class="timeline-step" id="step-confirmed">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Order Confirmed</h4>
                            <p class="small text-muted">We have received your order</p>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-packed">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Packed</h4>
                            <p class="small text-muted">Items gathered and packed</p>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-dispatched">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Out for Delivery</h4>
                            <div id="rider-info" class="rider-box d-none">
                                <div class="rider-avatar"><i class="fas fa-biking"></i></div>
                                <div>
                                    <div class="font-weight-bold">Rahul Kumar</div>
                                    <div class="small">Your delivery partner</div>
                                </div>
                                <a href="tel:+919876543210" class="call-btn"><i class="fas fa-phone"></i></a>
                            </div>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-delivered">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Delivered</h4>
                            <p class="small text-muted">Enjoy your items!</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="track-map-container">
                <div id="map"
                    style="width: 100%; height: 100%; background: #eee; display: flex; align-items: center; justify-content: center; color: #777;">
                    Map Loading...
                </div>
            </div>
        </div>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_GOOGLE_API_KEY&callback=initMap" async defer></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/utils/toast.js"></script>
    <script src="/assets/js/utils/formatters.js"></script>
    <script src="/assets/js/services/api.service.js"></script>
    <script src="/assets/js/layout/main-layout.js"></script>

    <script>
        let map, marker, orderId, socket;

        // Initialize Map
        window.initMap = function () {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 12.9716, lng: 77.5946 }, // Default Bangalore
                zoom: 13,
                disableDefaultUI: true,
                styles: [ { "featureType": "poi", "stylers": [ { "visibility": "off" } ] } ]
            });
            
            // Customer Marker (Destination)
            marker = new google.maps.Marker({ map: map, title: "Delivery Location" });

            // Rider Marker (Will add when available)
            window.riderMarker = new google.maps.Marker({ 
                map: map, 
                icon: 'https://cdn-icons-png.flaticon.com/32/3063/3063823.png', // Bike Icon
                title: "Rider"
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            orderId = new URLSearchParams(window.location.search).get('id');
            if (!orderId) {
                alert("No Order ID provided");
                window.location.href = '/orders.html';
                return;
            }

            document.getElementById('t-id').innerText = `Order #${orderId.slice(0,8).toUpperCase()}`;
            
            // Initial Fetch
            fetchOrderDetails();
            
            // Poll for status updates every 15 seconds
            setInterval(fetchOrderDetails, 15000);
        });

        async function fetchOrderDetails() {
            try {
                const order = await ApiService.get(`/orders/${orderId}/`);
                
                // 1. Update Timeline
                updateTimeline(order.status);

                // 2. Update Map Destination
                if (map && order.delivery_address_json && order.delivery_address_json.latitude) {
                    const dest = { 
                        lat: parseFloat(order.delivery_address_json.latitude), 
                        lng: parseFloat(order.delivery_address_json.longitude) 
                    };
                    marker.setPosition(dest);
                    if(!window.hasCentered) {
                        map.panTo(dest);
                        window.hasCentered = true;
                    }
                }

                // 3. Handle Rider Info
                if (order.rider && (order.status === 'out_for_delivery' || order.status === 'dispatched')) {
                    const rBox = document.getElementById('rider-info');
                    rBox.classList.remove('d-none');
                    rBox.querySelector('.font-weight-bold').innerText = order.rider.name || 'Delivery Partner';
                    rBox.querySelector('a').href = `tel:${order.rider.phone}`;

                    // Connect WebSocket if not connected
                    if (!socket) connectTrackingSocket(orderId);
                }

            } catch (e) {
                console.error("Tracking Error", e);
            }
        }

        function updateTimeline(status) {
            // Reset classes
            document.querySelectorAll('.timeline-step').forEach(el => el.classList.remove('active'));

            const statusMap = {
                'pending': [],
                'confirmed': ['step-confirmed'],
                'packing': ['step-confirmed'],
                'packed': ['step-confirmed', 'step-packed'],
                'dispatched': ['step-confirmed', 'step-packed', 'step-dispatched'],
                'out_for_delivery': ['step-confirmed', 'step-packed', 'step-dispatched'],
                'delivered': ['step-confirmed', 'step-packed', 'step-dispatched', 'step-delivered']
            };

            const activeIds = statusMap[status.toLowerCase()] || [];
            activeIds.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('active');
            });
        }

        async function connectTrackingSocket(orderId) {
            try {
                const res = await ApiService.post('/auth/ws/ticket/');
                const ticket = res.ticket;
                const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
                // Adjust Host if running locally vs production
                const host = window.APP_CONFIG.API_BASE_URL.split('//')[1].split('/')[0]; 
                
                socket = new WebSocket(`${protocol}://${host}/ws/orders/${orderId}/?ticket=${ticket}`);

                socket.onopen = () => console.log("Live Tracking Connected");
                
                socket.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    
                    if (data.type === 'rider_location') {
                        const pos = { lat: parseFloat(data.lat), lng: parseFloat(data.lng) };
                        if (window.riderMarker) window.riderMarker.setPosition(pos);
                    } 
                    else if (data.type === 'status_update') {
                        updateTimeline(data.status);
                        if(data.status === 'delivered') {
                            Toast.success("Order Delivered!");
                            socket.close();
                        }
                    }
                };

            } catch (err) {
                console.warn("WebSocket connection failed", err);
            }
        }
    </script>
</body>

</html>
