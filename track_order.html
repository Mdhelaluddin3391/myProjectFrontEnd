<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - QuickDash</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/track_order_style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main style="display: flex; flex-direction: column; height: calc(100vh - 70px);">
        <div class="track-layout">
            <div class="track-sidebar">
                <div class="d-flex align-center gap-2 mb-4">
                    <a href="/orders.html" class="text-muted"><i class="fas fa-arrow-left"></i></a>
                    <h2 class="m-0" id="t-id">Tracking...</h2>
                </div>

                <div class="timeline-wrapper">
                    <div class="timeline-step" id="step-confirmed">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Order Confirmed</h4>
                            <p class="small text-muted">We have received your order</p>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-packed">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Packed</h4>
                            <p class="small text-muted">Items gathered and packed</p>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-dispatched">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Out for Delivery</h4>
                            <div id="rider-info" class="rider-box d-none">
                                <div class="rider-avatar"><i class="fas fa-biking"></i></div>
                                <div>
                                    <div class="font-weight-bold">Rahul Kumar</div>
                                    <div class="small">Your delivery partner</div>
                                </div>
                                <a href="tel:+919876543210" class="call-btn"><i class="fas fa-phone"></i></a>
                            </div>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-delivered">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Delivered</h4>
                            <p class="small text-muted">Enjoy your items!</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="track-map-container">
                <div id="map"
                    style="width: 100%; height: 100%; background: #eee; display: flex; align-items: center; justify-content: center; color: #777;">
                    Map Loading...
                </div>
            </div>
        </div>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_GOOGLE_API_KEY_HERE&callback=initMap" async
        defer></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/services/api.service.js"></script>
    <script src="/assets/js/layout/main-layout.js"></script>

    <script>
        let map, marker, orderId, socket;
        let socket = null;

        window.initMap = function () {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 12.9716, lng: 77.5946 },
                zoom: 14,
                disableDefaultUI: true
            });
            marker = new google.maps.Marker({ map: map });

            // Start Tracking
            orderId = new URLSearchParams(window.location.search).get('id');
            if (orderId) {
                fetchStatus();
                setInterval(fetchStatus, 10000); // Poll every 10s
            }
        }

        async function connectTrackingSocket(orderId) {
            // 1. Cleanup existing connection if any
            if (socket) {
                socket.close();
            }

            try {
                const res = await ApiService.post('/auth/ws/ticket/');
                const ticket = res.ticket;
                const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
                socket = new WebSocket(`${wsProtocol}://${window.location.host}/ws/orders/${orderId}/?ticket=${ticket}`);

                socket.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'rider_location') {
                        updateRiderMarker(data.lat, data.lng);
                    } else if (data.type === 'status_update') {
                        updateTimeline(data.status);
                        if (data.status === 'delivered') {
                            socket.close(); // Cleanup on completion
                        }
                    }
                };

                socket.onclose = () => console.log("Tracking connection closed.");
                socket.onerror = (err) => console.error("WebSocket Error:", err);

            } catch (err) {
                Toast.error("Failed to connect to live tracking.");
            }
        }

        function updateRiderMarker(lat, lng) {
            const pos = { lat: parseFloat(lat), lng: parseFloat(lng) };
            if (marker) {
                marker.setPosition(pos);
                map.panTo(pos);
            }
        }


        window.addEventListener('beforeunload', () => {
    if (socket) socket.close();
});
    </script>
</body>

</html>
