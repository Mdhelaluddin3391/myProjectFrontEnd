<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - QuickDash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/track_order_style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main style="display: flex; flex-direction: column; height: calc(100vh - 70px);">
        <div class="track-layout">
            <div class="track-sidebar">
                <div class="d-flex align-center gap-2 mb-4">
                    <a href="/orders.html" class="text-muted"><i class="fas fa-arrow-left"></i></a>
                    <h2 class="m-0" id="t-id">Tracking...</h2>
                </div>

                <div class="timeline-wrapper">
                    <div class="timeline-step" id="step-confirmed">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Order Confirmed</h4>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-packed">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Packed</h4>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-dispatched">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Out for Delivery</h4>
                            <div id="rider-info" class="rider-box d-none">
                                <div class="rider-avatar"><i class="fas fa-biking"></i></div>
                                <div>
                                    <div class="font-weight-bold" id="r-name">Delivery Partner</div>
                                    <a id="r-phone" href="#" class="small">Call Rider</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="timeline-step" id="step-delivered">
                        <div class="dot"></div>
                        <div class="content">
                            <h4>Delivered</h4>
                        </div>
                    </div>
                </div>
            </div>

            <div class="track-map-container">
                <div id="map" style="width: 100%; height: 100%; background: #eee;"></div>
            </div>
        </div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/utils/toast.js"></script>
    <script src="/assets/js/utils/formatters.js"></script>
    <script src="/assets/js/services/api.service.js"></script>
    <script src="/assets/js/layout/main-layout.js"></script>

    <script>
        // [AUDIT FIX] Dynamic Google Maps Loading with Safety Check
        async function loadMapsScript() {
            // Ensure Config is loaded before accessing Key
            if (window.AppConfigService && !window.AppConfigService.isLoaded) {
                try {
                    await window.AppConfigService.load();
                } catch (e) {
                    console.error("Config load failed in map script");
                }
            }

            const key = window.APP_CONFIG.GOOGLE_MAPS_KEY || '';

            // Check if key is missing or is the default placeholder
            if (!key || key === 'REPLACE_WITH_REAL_KEY_DURING_BUILD' || key === 'YOUR_ACTUAL_GOOGLE_MAPS_KEY_HERE') {
                console.warn("Google Maps API Key not configured.");
                document.getElementById('map').innerHTML = `
                    <div style="height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#666;">
                        <i class="fas fa-map-marked-alt fa-3x mb-3"></i>
                        <p>Map unavailable (Configuration Pending)</p>
                    </div>`;
                return;
            }

            if (document.getElementById('gmaps-script')) return; // Prevent double load

            const script = document.createElement('script');
            script.id = 'gmaps-script';
            script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=initMap`;
            script.async = true;
            script.defer = true;
            script.onerror = () => {
                console.error("Failed to load Google Maps script.");
                document.getElementById('map').innerHTML = '<div style="padding:20px; text-align:center;">Map Load Error</div>';
            };
            document.body.appendChild(script);
        }

        let map, marker, riderMarker, orderId, socket;
        let reconnectInterval = 1000;

        window.initMap = function () {
            try {
                map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 12.9716, lng: 77.5946 },
                    zoom: 13,
                    disableDefaultUI: true
                });
                marker = new google.maps.Marker({ map: map, title: "Destination" });
                riderMarker = new google.maps.Marker({
                    map: map,
                    icon: 'https://cdn-icons-png.flaticon.com/32/3063/3063823.png',
                    title: "Rider"
                });
            } catch (e) {
                console.error("Map Init Error:", e);
            }
        };

        // Modified initialization to support async config loading
        document.addEventListener('DOMContentLoaded', async () => {
            orderId = new URLSearchParams(window.location.search).get('id');
            if (!orderId) return window.location.href = '/orders.html';

            document.getElementById('t-id').innerText = `Order #${orderId}`;
            
            // Wait for maps script logic which waits for config
            await loadMapsScript(); 
            
            fetchOrderDetails();
            connectTrackingSocket();
        });

        async function fetchOrderDetails() {
            try {
                const order = await ApiService.get(`/orders/${orderId}/`);
                updateTimeline(order.status);

                // Safe access to map object in case it failed to load
                if (order.delivery_address_json && typeof map !== 'undefined') {
                    const pos = {
                        lat: parseFloat(order.delivery_address_json.lat),
                        lng: parseFloat(order.delivery_address_json.lng)
                    };
                    marker.setPosition(pos);
                    map.panTo(pos);
                }

                if (order.delivery && order.delivery.rider) {
                    document.getElementById('rider-info').classList.remove('d-none');
                    document.getElementById('r-name').innerText = order.delivery.rider.user.first_name || 'Rider';
                    document.getElementById('r-phone').href = `tel:${order.delivery.rider.user.phone}`;
                }
            } catch (e) { console.error("Fetch error", e); }
        }

        function updateTimeline(status) {
            document.querySelectorAll('.timeline-step').forEach(el => el.classList.remove('active'));
            const map = {
                'confirmed': ['step-confirmed'],
                'packed': ['step-confirmed', 'step-packed'],
                'out_for_delivery': ['step-confirmed', 'step-packed', 'step-dispatched'],
                'delivered': ['step-confirmed', 'step-packed', 'step-dispatched', 'step-delivered']
            };
            (map[status.toLowerCase()] || []).forEach(id => document.getElementById(id).classList.add('active'));
        }

        async function connectTrackingSocket() {
            try {
                const res = await ApiService.post('/auth/ws/ticket/');
                const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
                // Handle port 8000 for local dev vs 80 for prod
                const host = window.APP_CONFIG.API_BASE_URL.replace('http://', '').replace('https://', '').split('/')[0];

                socket = new WebSocket(`${protocol}://${host}/ws/orders/${orderId}/?ticket=${res.ticket}`);

                socket.onopen = () => {
                    console.log("Connected to Live Tracking");
                    reconnectInterval = 1000; // Reset backoff
                };

                socket.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'rider_location') {
                        const pos = { lat: data.lat, lng: data.lng };
                        if (typeof riderMarker !== 'undefined') riderMarker.setPosition(pos);
                    } else if (data.type === 'status_update') {
                        updateTimeline(data.status);
                        Toast.info(data.message);
                        if (data.status === 'delivered') socket.close();
                    }
                };

                socket.onclose = (e) => {
                    console.warn("Socket closed. Reconnecting...", e.reason);
                    setTimeout(connectTrackingSocket, reconnectInterval);
                    reconnectInterval = Math.min(reconnectInterval * 2, 30000); // Exponential backoff max 30s
                };

            } catch (e) {
                console.error("Socket Auth Failed", e);
            }
        }
    </script>
</body>

</html>
